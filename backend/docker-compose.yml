services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: tabecar
      POSTGRES_PASSWORD: tabecar
      POSTGRES_DB: tabecar
    ports:
      - "5432:5432"
    volumes:
      - tabecar_pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./seed.sql:/docker-entrypoint-initdb.d/02_seed.sql

volumes:
  tabecar_pgdata:
